<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 3 Vokabel-Test (20 Fragen)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #e8ecef; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .quiz-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; border-top: 5px solid #3498db; }
        h1 { color: #2c3e50; margin-bottom: 0.5rem; font-size: 1.4rem; }
        #direction-box { background: #f8f9fa; padding: 8px; border-radius: 5px; font-weight: bold; color: #e67e22; margin-bottom: 10px; display: inline-block; font-size: 0.85rem; }
        .word-to-translate { font-size: 1.8rem; font-weight: bold; color: #2980b9; margin: 1rem 0; min-height: 1.5em; }
        input { width: 100%; padding: 15px; border: 2px solid #dcdde1; border-radius: 10px; font-size: 1.1rem; box-sizing: border-box; outline: none; text-align: center; }
        .btn-container { margin-top: 1.5rem; display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s; }
        .check-btn { background: #27ae60; color: white; }
        .restart-btn { background: #3498db; color: white; margin-top: 20px; width: 100%; }
        .feedback { margin-top: 1.5rem; font-weight: bold; min-height: 3.5em; }
        .correct { color: #27ae60; }
        .wrong { color: #e74c3c; }
        #result-screen { display: none; }
        canvas { max-width: 250px; margin: 20px auto; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-box">
        <h1>Unit 3 Test</h1>
        <div id="progress">Frage 1 von 20</div>
        <hr>
        <div id="direction-box">Lade...</div>
        <div class="word-to-translate" id="display-word">...</div>
        <input type="text" id="answer-input" placeholder="Antwort..." autocomplete="off" autofocus>
        <div class="btn-container">
            <button class="check-btn" onclick="checkAnswer()">Prüfen</button>
        </div>
        <div id="feedback" class="feedback"></div>
    </div>

    <div id="result-screen">
        <h1>Dein Ergebnis</h1>
        <p id="result-text"></p>
        <canvas id="myChart"></canvas>
        <button class="restart-btn" onclick="location.reload()">Test neu starten</button>
    </div>
</div>

<script>
    const vocab = [
        { de: "aushelfen", en: "to help out" }, { de: "Rettungsboot", en: "lifeboat" }, { de: "Krankenhaus", en: "hospital" },
        { de: "füttern", en: "to feed" }, { de: "vermitteln", en: "to mediate" }, { de: "gemeinnützige Arbeit", en: "community service" },
        { de: "Altersheim", en: "old people's home" }, { de: "schwierig", en: "difficult" }, { de: "ausländisch", en: "foreign" },
        { de: "Zukunft", en: "future" }, { de: "möglich", en: "possible" }, { de: "Chance", en: "chance" },
        { de: "verantwortlich sein für", en: "to be in charge of" }, { de: "Bewohner", en: "resident" }, { de: "Unkraut", en: "weed" },
        { de: "Müll", en: "rubbish" }, { de: "Hausarbeit", en: "chore" }, { de: "Spülmaschine", en: "dishwasher" },
        { de: "Messer", en: "knife" }, { de: "den Tisch decken", en: "to set the table" }, { de: "lecker", en: "delicious" },
        { de: "ekelhaft", en: "disgusting" }, { de: "schmecken", en: "to taste" }, { de: "aufhängen", en: "to hang up" },
        { de: "schummeln", en: "to cheat" }, { de: "frech", en: "naughty" }, { de: "schrecklich", en: "awful" }
        // ... (hier können alle weiteren Vokabeln stehen wie im vorherigen Code)
    ];

    let currentVocab;
    let mode;
    let score = 0;
    let totalAsked = 0;
    const maxQuestions = 20;

    function nextWord() {
        if (totalAsked >= maxQuestions) {
            showResults();
            return;
        }
        
        document.getElementById('progress').innerText = `Frage ${totalAsked + 1} von ${maxQuestions}`;
        currentVocab = vocab[Math.floor(Math.random() * vocab.length)];
        mode = Math.random() > 0.5 ? 'DE_TO_EN' : 'EN_TO_DE';
        
        const display = document.getElementById('display-word');
        const dirBox = document.getElementById('direction-box');
        
        if (mode === 'DE_TO_EN') {
            display.innerText = currentVocab.de;
            dirBox.innerText = "Deutsch ➔ Englisch";
        } else {
            display.innerText = currentVocab.en;
            dirBox.innerText = "Englisch ➔ Deutsch";
        }

        const inputField = document.getElementById('answer-input');
        inputField.value = '';
        inputField.focus();
        document.getElementById('feedback').innerText = '';
    }

    function checkAnswer() {
        const input = document.getElementById('answer-input').value.trim().toLowerCase();
        const feedback = document.getElementById('feedback');
        let isCorrect = false;

        if (mode === 'DE_TO_EN') {
            let correctAns = currentVocab.en.toLowerCase();
            isCorrect = (input === correctAns || input === correctAns.replace('to ', '') || (correctAns.startsWith('to ') && input === correctAns.substring(3)));
        } else {
            isCorrect = (input === currentVocab.de.toLowerCase());
        }

        if (isCorrect) {
            feedback.innerHTML = `<span class="correct">Richtig!</span>`;
            score++;
        } else {
            const sol = mode === 'DE_TO_EN' ? currentVocab.en : currentVocab.de;
            feedback.innerHTML = `<span class="wrong">Falsch.</span><br>Lösung: <b>${sol}</b>`;
        }

        totalAsked++;
        // Kurze Pause, damit man die Lösung sieht, dann weiter
        setTimeout(nextWord, 1500);
    }

    function showResults() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('result-text').innerText = `Du hast ${score} von ${maxQuestions} Vokabeln gewusst!`;

        // Chart erstellen
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Richtig', 'Falsch'],
                datasets: [{
                    data: [score, maxQuestions - score],
                    backgroundColor: ['#27ae60', '#e74c3c']
                }]
            },
            options: { responsive: true }
        });
    }

    document.getElementById('answer-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkAnswer();
    });

    nextWord();
</script>

</body>
</html>
