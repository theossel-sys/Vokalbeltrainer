<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabel-Trainer für Marlene</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #e8ecef; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .quiz-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; border-top: 5px solid #3498db; }
        h1 { color: #2c3e50; margin-bottom: 0.5rem; font-size: 1.4rem; }
        .subtitle { color: #7f8c8d; margin-bottom: 1rem; font-size: 0.9rem; }
        #direction-box { background: #f8f9fa; padding: 8px; border-radius: 5px; font-weight: bold; color: #e67e22; margin-bottom: 10px; display: inline-block; font-size: 0.85rem; }
        .word-to-translate { font-size: 1.8rem; font-weight: bold; color: #2980b9; margin: 1rem 0; min-height: 1.5em; }
        input { width: 100%; padding: 15px; border: 2px solid #dcdde1; border-radius: 10px; font-size: 1.1rem; box-sizing: border-box; outline: none; text-align: center; }
        input:focus { border-color: #3498db; }
        .btn-container { margin-top: 1.5rem; display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        .check-btn { background: #27ae60; color: white; }
        .skip-btn { background: #95a5a6; color: white; }
        .feedback { margin-top: 1.5rem; font-weight: bold; min-height: 3.5em; line-height: 1.4; }
        .correct { color: #27ae60; }
        .wrong { color: #e74c3c; }
        .stats { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #eee; color: #7f8c8d; display: flex; justify-content: space-around; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Unit 3: Helping out</h1>
    <div class="subtitle">Vokabeltrainer (Mix-Modus)</div>
    
    <div id="direction-box">Lade...</div>
    <div class="word-to-translate" id="display-word">...</div>
    
    <input type="text" id="answer-input" placeholder="Antwort eingeben..." autocomplete="off" autofocus>
    
    <div class="btn-container">
        <button class="skip-btn" onclick="nextWord()">Überspringen</button>
        <button class="check-btn" onclick="checkAnswer()">Prüfen</button>
    </div>

    <div id="feedback" class="feedback"></div>
    
    <div class="stats">
        <span>Richtig: <b id="score">0</b></span>
        <span>Gelernt: <b id="total">0</b></span>
    </div>
</div>

<script>
    const vocab = [
        // Intro & S. 74-75
        { de: "aushelfen", en: "to help out" }, { de: "Rettungsboot", en: "lifeboat" }, { de: "Krankenhaus", en: "hospital" },
        { de: "Blindenführhund", en: "guide dog" }, { de: "Elefant", en: "elephant" }, { de: "Schutzgebiet", en: "sanctuary" },
        { de: "füttern", en: "to feed" }, { de: "vermitteln (bei Streit)", en: "to mediate" },
        // Part A
        { de: "gemeinnützige Arbeit", en: "community service" }, { de: "Gemeinde", en: "community" }, { de: "Gemeinschaft", en: "community" },
        { de: "Dienst", en: "service" }, { de: "Altersheim", en: "old people's home" },
        { de: "sich eintragen", en: "to sign up" }, { de: "Welche Art von", en: "what kind of" }, { de: "Kumpel", en: "buddy" },
        { de: "weiterführende Schule", en: "secondary school" }, { de: "schwierig", en: "difficult" }, { de: "Generation", en: "generation" },
        { de: "Zeitung", en: "newspaper" }, { de: "Dolmetscher", en: "interpreter" }, { de: "gut (Adverb)", en: "well" },
        { de: "ausländisch", en: "foreign" }, { de: "hausgemacht", en: "home-made" }, { de: "Marmelade", en: "jam" },
        { de: "Schaukel", en: "swing" }, { de: "Zukunft", en: "future" }, { de: "möglich", en: "possible" },
        { de: "unmöglich", en: "impossible" }, { de: "Option", en: "option" }, { de: "insgesamt", en: "altogether" },
        { de: "Chance", en: "chance" }, { de: "sich konzentrieren auf", en: "to focus on" }, { de: "Sehr geehrte Damen und Herren", en: "Dear Sir or Madam" },
        // Part B
        { de: "verantwortlich sein für", en: "to be in charge of" }, { de: "Rest", en: "rest" }, { de: "zehnminütiger Spaziergang", en: "a ten-minute walk" },
        { de: "begrüßen", en: "to welcome" }, { de: "herzlich", en: "warmly" }, { de: "Bewohner", en: "resident" },
        { de: "Rose", en: "rose" }, { de: "pflanzen", en: "to plant" }, { de: "Blumenbeet", en: "flower bed" },
        { de: "Unkraut", en: "weed" }, { de: "jäten", en: "to weed" }, { de: "herausreißen", en: "to pull up" },
        { de: "fortfahren", en: "to go on" }, { de: "Löwenzahn", en: "dandelion" }, { de: "hart arbeiten", en: "to work hard" },
        { de: "stolz auf", en: "proud of" }, { de: "Vogel", en: "bird" }, { de: "Rotkehlchen", en: "robin" },
        { de: "Luft", en: "air" }, { de: "Dreck", en: "dirt" }, { de: "Müll", en: "rubbish" }, { de: "glänzend", en: "shiny" },
        { de: "Ring", en: "ring" }, { de: "aufleuchten", en: "to light up" }, { de: "verloren", en: "lost" },
        { de: "für immer", en: "for ever" }, { de: "anstelle von", en: "instead of" },
        // Part C
        { de: "Hausarbeit", en: "chore" }, { de: "zweimal", en: "twice" }, { de: "einmal", en: "once" },
        { de: "ausräumen", en: "to empty" }, { de: "Spülmaschine", en: "dishwasher" }, { de: "scharf", en: "sharp" },
        { de: "Messer", en: "knife" }, { de: "Messer (Mehrzahl)", en: "knives" }, { de: "den Tisch decken", en: "to set the table" },
        { de: "Ich nehme an", en: "I guess" }, { de: "Koch", en: "chef" }, { de: "Füllung", en: "filling" },
        { de: "lecker", en: "delicious" }, { de: "Soße", en: "sauce" }, { de: "ekelhaft", en: "disgusting" },
        { de: "schmecken", en: "to taste" }, { de: "Essig", en: "vinegar" }, { de: "Senf", en: "mustard" },
        { de: "Minze", en: "mint" }, { de: "Preiselbeere", en: "cranberry" }, { de: "Truthahn", en: "turkey" },
        { de: "traditionell", en: "traditional" }, { de: "aufhängen", en: "to hang up" }, { de: "Wäsche", en: "laundry" },
        { de: "staubsaugen", en: "to vacuum" }, { de: "Herzlichen Glückwunsch", en: "Congratulations" }, { de: "Fahrkarte", en: "ticket" },
        // Story
        { de: "Rückmeldung", en: "feedback" }, { de: "Blickkontakt herstellen", en: "to make eye contact" }, { de: "Kriterium", en: "criterion" },
        { de: "erstens", en: "firstly" }, { de: "zweitens", en: "secondly" }, { de: "endlich", en: "finally" },
        { de: "Einleitung", en: "introduction" }, { de: "Feld", en: "square" }, { de: "Sekunde", en: "second" },
        { de: "schummeln", en: "to cheat" }, { de: "anklopfen", en: "to knock" }, { de: "Enkelin", en: "granddaughter" },
        { de: "Enkel", en: "grandson" }, { de: "Gemälde", en: "painting" }, { de: "Landschaft", en: "countryside" },
        { de: "Es ist schade", en: "it's a pity" }, { de: "berühren", en: "to touch" }, { de: "wunderbar", en: "wonderful" },
        { de: "werden", en: "to turn" }, { de: "Mond", en: "moon" }, { de: "oben", en: "above" }, { de: "Stern", en: "star" },
        { de: "gähnen", en: "to yawn" }, { de: "verschwinden", en: "to disappear" }, { de: "reiben", en: "to rub" },
        { de: "frech", en: "naughty" }, { de: "schrecklich", en: "awful" }, { de: "technisch", en: "technical" }, { de: "Jedenfalls", en: "anyway" }
    ];

    let currentVocab;
    let mode; // 'DE_TO_EN' oder 'EN_TO_DE'
    let score = 0;
    let totalAsked = 0;

    function nextWord() {
        currentVocab = vocab[Math.floor(Math.random() * vocab.length)];
        mode = Math.random() > 0.5 ? 'DE_TO_EN' : 'EN_TO_DE';
        
        const display = document.getElementById('display-word');
        const dirBox = document.getElementById('direction-box');
        
        if (mode === 'DE_TO_EN') {
            display.innerText = currentVocab.de;
            dirBox.innerText = "Deutsch ➔ Englisch";
        } else {
            display.innerText = currentVocab.en;
            dirBox.innerText = "Englisch ➔ Deutsch";
        }

        const inputField = document.getElementById('answer-input');
        inputField.value = '';
        inputField.focus();
        document.getElementById('feedback').innerText = '';
    }

    function checkAnswer() {
        const input = document.getElementById('answer-input').value.trim().toLowerCase();
        const feedback = document.getElementById('feedback');
        let isCorrect = false;
        let correctAnswer = "";

        if (mode === 'DE_TO_EN') {
            correctAnswer = currentVocab.en.toLowerCase();
            isCorrect = (input === correctAnswer || 
                         input === correctAnswer.replace('to ', '') || 
                         (correctAnswer.startsWith('to ') && input === correctAnswer.substring(3)));
        } else {
            correctAnswer = currentVocab.de.toLowerCase();
            // Einfacher Vergleich für Deutsch
            isCorrect = (input === correctAnswer);
        }

        totalAsked++;
        document.getElementById('total').innerText = totalAsked;

        if (isCorrect) {
            feedback.innerHTML = `<span class="correct">Hervorragend!</span><br><small>${currentVocab.de} = ${currentVocab.en}</small>`;
            score++;
            document.getElementById('score').innerText = score;
            setTimeout(nextWord, 1500);
        } else {
            const solution = mode === 'DE_TO_EN' ? currentVocab.en : currentVocab.de;
            feedback.innerHTML = `<span class="wrong">Nicht ganz...</span><br>Richtig wäre: <b>${solution}</b>`;
        }
    }

    document.getElementById('answer-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkAnswer();
    });

    nextWord();
</script>

</body>
</html>
