<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 3 Vokabel-Trainer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h1 { color: #2c3e50; font-size: 1.5rem; margin-bottom: 1.5rem; }
        .word-to-translate { font-size: 1.8rem; font-weight: bold; color: #3498db; margin-bottom: 1rem; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: #3498db; }
        .btn-container { margin-top: 1.5rem; display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        .check-btn { background: #27ae60; color: white; }
        .check-btn:hover { background: #219150; }
        .skip-btn { background: #95a5a6; color: white; }
        .feedback { margin-top: 1.5rem; font-weight: bold; min-height: 1.2em; }
        .correct { color: #27ae60; }
        .wrong { color: #e74c3c; }
        .stats { margin-top: 1rem; font-size: 0.9rem; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Unit 3: Vocabulary Quiz</h1>
    <div id="direction">Übersetze ins Englische:</div>
    <div class="word-to-translate" id="german-word">Lade...</div>
    <input type="text" id="answer-input" placeholder="Deine Antwort hier..." autocomplete="off">
    
    <div class="btn-container">
        <button class="skip-btn" onclick="nextWord()">Überspringen</button>
        <button class="check-btn" onclick="checkAnswer()">Prüfen</button>
    </div>

    <div id="feedback" class="feedback"></div>
    <div class="stats">Richtig: <span id="score">0</span></div>
</div>

<script>
    const vocab = [
        { de: "gemeinnützige Arbeit", en: "community service" },
        { de: "vermitteln", en: "to mediate" },
        { de: "verantwortlich sein für", en: "to be in charge of" },
        { de: "Bewohner", en: "resident" },
        { de: "sich konzentrieren auf", en: "to focus on" },
        { de: "Hausarbeit / Pflicht", en: "chore" },
        { de: "den Tisch decken", en: "to set the table" },
        { de: "ekelhaft / widerlich", en: "disgusting" },
        { de: "köstlich", en: "delicious" },
        { de: "jemandem einen Streich spielen", en: "to play a trick on sb." },
        { de: "frech / ungezogen", en: "naughty" },
        { de: "schwierig", en: "difficult" },
        { de: "Marmelade", en: "jam" },
        { de: "Zukunft", en: "future" },
        { de: "Müll", en: "rubbish" },
        { de: "schummeln / betrügen", en: "to cheat" },
        { de: "verschwinden", en: "to disappear" },
        { de: "fremd / ausländisch", en: "foreign" }
    ];

    let currentVocab;
    let score = 0;

    function nextWord() {
        currentVocab = vocab[Math.floor(Math.random() * vocab.length)];
        document.getElementById('german-word').innerText = currentVocab.de;
        document.getElementById('answer-input').value = '';
        document.getElementById('feedback').innerText = '';
        document.getElementById('answer-input').focus();
    }

    function checkAnswer() {
        const input = document.getElementById('answer-input').value.trim().toLowerCase();
        const feedback = document.getElementById('feedback');
        const correctAns = currentVocab.en.toLowerCase();

        if (input === correctAns || input === correctAns.replace('to ', '')) {
            feedback.innerText = "Richtig! Well done!";
            feedback.className = "feedback correct";
            score++;
            document.getElementById('score').innerText = score;
            setTimeout(nextWord, 1500);
        } else {
            feedback.innerText = `Leider falsch. Richtig wäre: ${currentVocab.en}`;
            feedback.className = "feedback wrong";
        }
    }

    // Enter-Taste zum Bestätigen
    document.getElementById('answer-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkAnswer();
    });

    // Start
    nextWord();
</script>

</body>
</html>
